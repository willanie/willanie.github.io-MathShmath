<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> <!-- Link to your single CSS file -->
    <style>
        .custom-btn {
        background-color: #04AA6D; /* Green background */
        border: 3px;
        color: white;
        padding: 0.6vw 1.2vw;
        text-align: center;
        font-size: 2vw;
        cursor: pointer;
        border-radius: 6px; /* Rounded corners */
        }
        .custom-btn.hover { background-color: #015f3d; }

        .custom-btn.active { background-color: #ff0000; }
        .trigcontainer {
            /* background: #f30404; */
            width: 90vw;
            height: 68vh;
            /* max-width: 760px;
            max-height: 500px; */
            text-align: center;
            margin: 0 auto;
            /* height: -webkit-fill-available; */
        }
        canvas {
            background: #1e1e1e;
            border-radius: 4px;
            width: 100%;
            height: auto;
            border: 1px solid #333;
        }
        .controls {
            margin-top: 2px;
            display: grid;
            gap: 4px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #252525;
            padding: 4px;
            border-radius: 8px;
        }
        label { font-size: 0.8rem; font-weight: 600; color: #888; width: 40px; text-align: left; }
        input[type="number"] {
            width: 55px;
            background: #222222;
            border: 1px solid #444;
            color: #00ffcc;
            padding: 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        input[type="range"] { flex-grow: 1; accent-color: #00ffcc; }
    </style>
</head>
<body>
    <nav id="navbar"; class="navbar";>
        <a href="index.html"><span>&#x1F3E0;</span><span>Home</span></a>
        <a href="trig.html" class="active"><span>&#x223F;</span><span>Trig</span></a>
        <a href="credits.html"><span>&#x1F465;</span><span>Credits</span></a>
        <a href="donuts.html"><span>&#x1F369;</span><span>Donuts</span></a>
    </nav>
    <h1 id="trigtitle"; style="color: #ff00ff; text-align: center; font-weight: 900; margin-bottom: 0; font-size: 0.8rem;">Trig Starter</h1>

<div id="trigcontainer"; class="trigcontainer" style="background-color: #cf02f8;">
    <button class="custom-btn active"; id="SinButton" onclick="toggleActive(this)">SIN</button>
    <button class="custom-btn"; id="CosButton" onclick="toggleActive(this)">COS</button>
    <h2 id="trigformula"; style="color: #0bd40b; margin-top: 0; margin-bottom: 0;">Sin <i>f</i>(&theta;) =  A&sdot;sin(F&sdot;&theta; + P)</h2>
    <canvas id="graph"></canvas>
    <div id="wavecontrols"; class="controls">
        <div  id="ampcontrol"; class="control-group">
            <label style="color: white;">Amp</label>
            <input type="range" id="ampSlider" min="0" max="10" value="10">
            <input type="number" id="ampInput" value="10">
        </div>
        <div id="freqcontrol"; class="control-group">
            <label style="color: white;">Freq</label>
            <input type="range" id="freqSlider" min="1" max="20" step="0.1" value="1">
            <input type="number" id="freqInput" value="1">
        </div>
        <div  id="phasecontrol"; class="control-group">
            <label style="color: white;">Phase</label>
            <input type="range" id="phaseSlider" min="0" max="20" step="0.1" value="0">
            <input type="number" id="phaseInput" value="0">
        </div>
    </div>
</div>

    <script>
    function getDeviceType() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const isTouch = navigator.maxTouchPoints > 0;
        const isCoarse = window.matchMedia("(pointer: coarse)").matches;

        if (isTouch && isCoarse) {
            if (width < 768){
                return 'mobile';
            } else {
                return 'tablet';
            }
        }
        return 'desktop/laptop';
    }
    function getDeviceOrientation() {
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;  
        return isPortrait ? "Portrait" : "Landscape";  
    }


    var activebutton = "SIN";
    function toggleActive(button) {
        const buttonIds = ["SinButton", "CosButton"];
        buttonIds.forEach(id => {
            document.getElementById(id).style.backgroundColor = "#04AA6D";
        });
        button.classList.toggle('active');
        button.style.backgroundColor = "#ff0000";
        if (button.id == "SinButton") {
            //console.log("SIN button clicked");
            activebutton = "SIN";
            document.getElementById("trigformula").innerHTML = "Sin <i>f</i>(&theta;) =  A&sdot;sin(F&sdot;&theta; + P)";
            resize();
        } else if (button.id == "CosButton") {
            //console.log("COS button button clicked");
            activebutton = "COS";
            document.getElementById("trigformula").innerHTML = "Cos <i>f</i>(&theta;) =  A&sdot;cos(F&sdot;&theta; + P)";
            resize();
        }
    }

    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    console.log("early on ctxcanvaswidth=%d ctxcanvasheight=%d", ctx.canvas.width, ctx.canvas.height);
    const controls = {
        amp: { s: document.getElementById('ampSlider'), n: document.getElementById('ampInput') },
        freq: { s: document.getElementById('freqSlider'), n: document.getElementById('freqInput') },
        phase: { s: document.getElementById('phaseSlider'), n: document.getElementById('phaseInput') }
    };
    const devicetype = getDeviceType();
    const orientation = getDeviceOrientation();
    const trigtitleheight = document.getElementById('trigtitle').offsetHeight;
    const trigformulaheight = document.getElementById('trigformula').offsetHeight;
    const SinButtonheight = document.getElementById('SinButton').offsetHeight;
    const trigcontainerheight = document.getElementById('trigcontainer').offsetHeight;
    const wavecontrolsheight = document.getElementById('wavecontrols').offsetHeight;
    const ampInputheight = document.getElementById('ampcontrol').offsetHeight;
    const freqInputheight = document.getElementById('freqcontrol').offsetHeight;
    const phaseInputheight = document.getElementById('phaseInput').offsetHeight;
    const navbarheight = document.getElementById('phaseInput').offsetHeight;
    console.log("device=%s orientation=%s trigcontainerH=%d titleH=%d formulaH=%d sinbuttonH=%d", devicetype, orientation, trigcontainerheight, trigtitleheight, trigformulaheight, SinButtonheight);
    console.log("wavecontrolsheight=%d ampInputheight=%d freqInputheight=%d phaseInputheight=%d navbarheight=%d", wavecontrolsheight, ampInputheight, freqInputheight, phaseInputheight, navbarheight);


    const ampslider = document.getElementById('ampSlider');
    const ampmax = ampslider.max;
    //console.log("amp max=%d", ampmax);
    let originalwidth = document.documentElement.clientWidth;
    let originalheight = document.documentElement.clientHeight;
    let w, h;
    let mobilelandscapeH = 260;
    let mobileH = 360;
    let largerH = 700;
    let extralargeH = 700;
    let tabletlandscapeH = 1060;
    let tabletportraitH = 1300;
    let fixamp = 1.0;
    const mobileOrientationHeights = [700, 360];
    function resize() {
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        console.log(isPortrait);
        console.log(isPortrait ? "Portrait" : "Landscape");
        if (isPortrait) {
            console.log("isPortrait=%s height chosen=%d", isPortrait, mobileOrientationHeights[1]);
        }
        else {
            console.log("isPortrait=%s height chosen=%d", isPortrait, mobileOrientationHeights[0]);
        }
        console.log("in resize before assignment canvaswidth=%d canvasheight=%d canvasoffsetWidth=%d", canvas.width, canvas.height, canvas.offsetWidth);
        w = canvas.width = canvas.offsetWidth * 2;
        h = canvas.height = largerH;
        console.log("originalwidth=%d originalheight=%d w=%d h=%d", originalwidth, originalheight, w, h);
        if (devicetype == 'mobile'){
            if (orientation == 'Portrait'){
                h = canvas.height = largerH;
                fixamp = ( mobileH / mobileH );
            } else {
                h = canvas.height = mobilelandscapeH;
                fixamp = ( mobilelandscapeH / mobileH);
            }
        }
        if (devicetype == 'tablet') {
            if (orientation == 'Portrait') {
                h = canvas.height = tabletportraitH;
                fixamp = ( tabletportraitH / mobileH);
            } else {
                h = canvas.height = tabletlandscapeH;
                fixamp = ( tabletlandscapeH / mobileH);
            }
        }

        if (devicetype == 'desktop/laptop') {
            h = canvas.height = extralargeH;
            fixamp = ( extralargeH / mobileH);
        }
/*
        if (originalwidth < 680) {
            console.log("width less than 680 w=%d", originalwidth);
            if (isPortrait) {
                h = canvas.height = largerH;
                console.log("got in here portrait h=%d", h);
            } else {
                h = canvas.height = mobilelandscapeH;
                console.log("still mobile not portrait h=%d", h);
            }
        } else {
            console.log("width greater than 680 w=%d", originalwidth);
            if (isPortrait) {
                h = canvas.height = extralargeH;
                console.log("got in here portrait h=%d", h);
            } else {
                h = canvas.height = extralargeH;
                console.log("still mobile not portrait h=%d", h);
            }
        }
*/
        draw();
    }

    function update(key, val) {
        controls[key].s.value = val;
        controls[key].n.value = val;
        draw();
    }

    Object.keys(controls).forEach(key => {
        controls[key].s.oninput = (e) => update(key, e.target.value);
        controls[key].n.oninput = (e) => update(key, e.target.value);
    });

    function draw() {
        ctx.clearRect(0, 0, w, h);
        
        // Grid & Labels
        ctx.strokeStyle = '#4a4a4a';
        ctx.lineWidth = 5;
        ctx.fillStyle = '#999';
        ctx.font = '24px sans-serif';
        
        // vertical lines
        for(let i = 0; i <= 10; i++) {
            let x = (w/10) * i;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        }

        // horizontal lines
        for(let i = 0; i <= 6; i++) {
            let y = (h/6) * i;
            let num = 10 - ((ampmax / 3) * i);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            //ctx.fillText(Math.round(h/2 - y), 10, y - 10);
            ctx.fillText(Math.round(num), 10, y - 10);
        }
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        // Sine Wave
        let ampscale = 17.9;
        console.log("in draw isPortrait=%s canvaswidth=%d w=%d h=%d", isPortrait, canvas.width, w, h);
        if (canvas.width > 600) {
            console.log("in ampscale fix isPortrait=%s width=%d", isPortrait, w);
/*
            let fixamp = ( largerH / mobileH);
            if (!isPortrait && h < 400 ) {
                fixamp = 1.0 * ( mobilelandscapeH / mobileH);
                console.log("got here fixamp=%f", fixamp);
            } else {
                fixamp = 1.0 * ( extralargeH / mobileH);
            }
*/
            ampscale = ampscale * fixamp;
        }
        const a = parseFloat(controls.amp.n.value) * ampscale;
        const f = parseFloat(controls.freq.n.value) * 1.0;
        let p = 0;
        //console.log(activebutton);
        if (activebutton == "SIN") {
            //console.log("SIN button here");
            p = parseFloat(controls.phase.n.value) * 1.0;    
        } else {
            //console.log("COS button here");
            p = (parseFloat(controls.phase.n.value) * 1.0) + Math.PI;
        }
        
        const step = f * ((2.0 * Math.PI) / w);
        //console.log("w=%f freq=%f phase=%f step=%f PI=%f", w,f,p,step, Math.PI);

        ctx.beginPath();
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 5;
        for (let x = 0; x < w; x++) {
            const xUnit = x * step;
            let y = 0;
            //console.log("inside %s", activebutton);
            if (activebutton == "SIN") {
                //console.log("inside sin side of if %s p=%f", activebutton, p);
                y = h/2 + Math.sin((xUnit) + p) * a;
            } else {
                //console.log("inside cos side of if %s p=%f", activebutton, p);
                y = h/2 + Math.cos((xUnit) + p) * a;
            }
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    window.onresize = resize;
    resize();
    window.addEventListener('load', () => {
    // Get the updated viewport dimensions
    originalwidth = window.innerWidth;
    originalheight = window.innerHeight;
    
    console.log(`Document loaded: ${originalwidth}x${originalheight}`);
    });
    window.addEventListener('orientationchange', () => {
    // Get the updated viewport dimensions
    originalwidth = window.innerWidth;
    originalheight = window.innerHeight;
    
    console.log(`orientationchange called: ${originalwidth}x${originalheight}`);
    });
</script>
</body>
</html>
